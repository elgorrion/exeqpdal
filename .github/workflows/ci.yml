name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Lint, type check, tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format
        run: ruff format . --check

      - name: Ruff check
        run: ruff check .

      - name: Mypy
        run: mypy exeqpdal

      - name: Pytest (unit)
        run: pytest -m "not integration" tests/

      - name: Build package
        if: matrix.python-version == '3.12'
        run: |
          rm -rf dist/
          python -m build
          twine check dist/*

  integration:
    name: Integration tests (real PDAL)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up PDAL
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: pdal-env
          condarc: |
            channels:
              - conda-forge
          create-args: >-
            libpdal
          cache-environment: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: tests/test_data_laz/*.laz
          key: test-data-v1

      - name: Fetch test data
        run: python scripts/fetch_test_data.py

      - name: Stage drift check
        shell: bash -el {0}
        run: python scripts/check_stage_drift.py

      - name: Pytest (integration)
        shell: bash -el {0}
        run: pytest -m "integration and not benchmark and not database" tests/
